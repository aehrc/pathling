# Runs Trivy security scan with SARIF output, re-running with table format on failure
# for human-readable output.
#
# Author: John Grimes

name: Trivy Security Scan
description: Run Trivy security scan with SARIF output, table on failure.

inputs:
  scan-ref:
    description: Path to scan (relative to repo root).
    required: false
    default: "."
  skip-files:
    description: Files to skip (glob patterns).
    required: false
    default: "**/target/**/*"
  skip-dirs:
    description: Directories to skip (comma-separated).
    required: false
    default: ""
  ignore-unfixed:
    description: Ignore unfixed vulnerabilities.
    required: false
    default: "false"
  skip-db-update:
    description: Skip Trivy database updates (use cached DB).
    required: false
    default: "false"
  trivyignore:
    description: Path to .trivyignore file (relative to repo root).
    required: false
    default: ".trivyignore"
  sarif-output:
    description: Path for SARIF output file.
    required: false
    default: "trivy-results.sarif"
  effective-pom:
    description: |
      Generate a Maven effective POM and scan that instead of the source pom.xml.
      Works around Trivy pom-parser bugs around BOM imports and property
      overrides (see aquasecurity/trivy issues #8049, #8036, #5748). The
      effective POM has all dependencyManagement BOM imports flattened and all
      properties resolved, giving Trivy concrete versions to match against.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Generate effective POM
      id: effective-pom
      if: inputs.effective-pom == 'true'
      shell: bash
      run: |
        set -euo pipefail
        out_dir="${RUNNER_TEMP}/trivy-effective-pom/${{ inputs.scan-ref }}"
        mkdir -p "${out_dir}"
        mvn --batch-mode --quiet \
          -f "${{ inputs.scan-ref }}/pom.xml" \
          help:effective-pom \
          -Doutput="${out_dir}/pom.xml"
        echo "scan-ref=${out_dir}" >> "$GITHUB_OUTPUT"

    - name: Run security scan (SARIF output)
      id: sarif-scan
      uses: aquasecurity/trivy-action@0.35.0
      continue-on-error: true
      env:
        TRIVY_SKIP_DB_UPDATE: ${{ inputs.skip-db-update }}
        TRIVY_SKIP_JAVA_DB_UPDATE: ${{ inputs.skip-db-update }}
        TRIVY_IGNOREFILE: ${{ inputs.trivyignore }}
      with:
        scan-type: repo
        scan-ref: ${{ steps.effective-pom.outputs.scan-ref || inputs.scan-ref }}
        ignore-unfixed: ${{ inputs.ignore-unfixed }}
        format: sarif
        output: ${{ inputs.sarif-output }}
        skip-files: ${{ inputs.skip-files }}
        skip-dirs: ${{ inputs.skip-dirs }}
        exit-code: "1"
        severity: MEDIUM,HIGH,CRITICAL
        version: "v0.70.0"

    - name: Run security scan (table output on failure)
      if: steps.sarif-scan.outcome == 'failure'
      uses: aquasecurity/trivy-action@0.35.0
      env:
        TRIVY_SKIP_DB_UPDATE: ${{ inputs.skip-db-update }}
        TRIVY_SKIP_JAVA_DB_UPDATE: ${{ inputs.skip-db-update }}
        TRIVY_IGNOREFILE: ${{ inputs.trivyignore }}
      with:
        scan-type: repo
        scan-ref: ${{ steps.effective-pom.outputs.scan-ref || inputs.scan-ref }}
        ignore-unfixed: ${{ inputs.ignore-unfixed }}
        format: table
        skip-files: ${{ inputs.skip-files }}
        skip-dirs: ${{ inputs.skip-dirs }}
        skip-setup-trivy: true
        exit-code: "1"
        severity: MEDIUM,HIGH,CRITICAL
        version: "v0.70.0"
