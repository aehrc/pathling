pathlingCache:
  image: "ghcr.io/aehrc/pathling-cache:latest"
  imagePullPolicy: "IfNotPresent"
  replicas: 1

  # Pathling server connection settings (required).
  pathlingHost: ~
  pathlingPort: ~

  # Maximum time the cache waits for the first byte of a backend response,
  # expressed as a Varnish duration (e.g. "60s", "10m"). Raise this when
  # synchronous Pathling queries take longer than the Varnish default of 60s.
  firstByteTimeout: "60s"

  service:
    type: "ClusterIP"
    port: 80

  resources: {}
    # requests:
    #   memory: "128Mi"
    #   cpu: "100m"
    # limits:
    #   memory: "256Mi"
    #   cpu: "200m"

  tolerations: []
  affinity: {}
  nodeSelector: {}
